image: mcr.microsoft.com/playwright/java:v1.57.0-noble

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "development"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: always
    - when: never

stages:
  - tests-ui
  - tests-webkit
  - tests-api
  - tests-performance
  - report
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Xmx512m -XX:+UseG1GC"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
  CI: "true"

.test_base: &test_base
  retry:
    max: 2
    when: script_failure
  allow_failure: true
  cache:
    key: "maven-$BROWSER"
    paths:
      - .m2/repository
  script:
    - mvn $MAVEN_CLI_OPTS test -T 1 -Dsurefire.failIfNoSpecifiedTests=false -Dsurefire.suiteXmlFiles=testng-$BROWSER.xml -Dallure.results.directory=target/allure-results-$BROWSER
  artifacts:
    when: always
    paths:
      - target/allure-results-$BROWSER/
      - target/surefire-reports/
    reports:
      junit: target/surefire-reports/TEST-*.xml
    expire_in: 7 days

execute-tests-chromium:
  stage: tests-ui
  <<: *test_base
  variables:
    BROWSER: chromium

execute-tests-firefox:
  stage: tests-ui
  <<: *test_base
  variables:
    BROWSER: firefox

execute-tests-webkit:
  stage: tests-webkit
  <<: *test_base
  variables:
    BROWSER: webkit

execute-tests-api:
  stage: tests-api
  retry:
    max: 2
    when: script_failure
  allow_failure: true
  cache:
    key: "maven-api"
    paths:
      - .m2/repository
  script:
    - mvn $MAVEN_CLI_OPTS test -Dsurefire.failIfNoSpecifiedTests=false -Dsurefire.suiteXmlFiles=testng-api.xml -Dallure.results.directory=target/allure-results-api
  artifacts:
    when: always
    paths:
      - target/allure-results-api/
      - target/surefire-reports/
    reports:
      junit: target/surefire-reports/TEST-*.xml
    expire_in: 7 days

execute-tests-performance:
  stage: tests-performance
  retry:
    max: 2
    when: script_failure
  image:
    name: grafana/k6:latest
    entrypoint: [""]
  script:
    - mkdir -p target/allure-results-performance
    - k6 run $CI_PROJECT_DIR/performance/tests/Fee.js || true
    - k6 run $CI_PROJECT_DIR/performance/tests/Rate.js || true
  allow_failure: true
  artifacts:
    when: always
    paths:
      - target/allure-results-performance/
    expire_in: 7 days

generate-allure-report:
  stage: report
  image: eclipse-temurin:21-jre-jammy
  allow_failure: true
  dependencies:
    - execute-tests-chromium
    - execute-tests-firefox
    - execute-tests-webkit
    - execute-tests-api
    - execute-tests-performance

  before_script:
    - apt-get update -qq && apt-get install -y wget
    - wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
    - tar -xzf allure-2.27.0.tgz -C /opt/
    - ln -s /opt/allure-2.27.0/bin/allure /usr/local/bin/allure
  script:
    - mkdir -p target/allure-results-merged
    - cp -r target/allure-results-chromium/* target/allure-results-merged/ || true
    - cp -r target/allure-results-firefox/* target/allure-results-merged/ || true
    - cp -r target/allure-results-webkit/* target/allure-results-merged/ || true
    - cp -r target/allure-results-api/* target/allure-results-merged/ || true
    - cp -r target/allure-results-performance/* target/allure-results-merged/ || true
    - allure generate target/allure-results-merged --clean -o target/allure-report
  artifacts:
    when: always
    paths:
      - target/allure-report/
    expire_in: 15 days

pages:
  stage: deploy
  allow_failure: true
  dependencies:
    - generate-allure-report

  script:
    - mkdir -p public
    - cp -r target/allure-report/* public/

  artifacts:
    paths:
      - public/
    expire_in: 15 days
