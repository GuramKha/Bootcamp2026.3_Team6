image: maven:3.9.14-eclipse-temurin-21

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "development"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: always
    - when: never

stages:
  - tests
  - report
  - deploy

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository
    - allure-history/

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  CI: "true"

execute-tests:
  stage: tests
  allow_failure: true
  before_script:
    - apt-get update -qq && apt-get install -y wget

    - mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install-deps" -D exec.classpathScope=test

    - mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium firefox" -D exec.classpathScope=test

  script:
    - mvn clean test -Dsurefire.failIfNoSpecifiedTests=false

  artifacts:
    when: always
    paths:
      - target/allure-results/
      - target/surefire-reports/
    reports:
      junit: target/surefire-reports/TEST-*.xml
    expire_in: 7 days

generate-allure-report:
  stage: report
  allow_failure: true
  dependencies:
    - execute-tests

  before_script:
    - apt-get update -qq && apt-get install -y wget
    - wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
    - tar -xzf allure-2.27.0.tgz -C /opt/
    - ln -s /opt/allure-2.27.0/bin/allure /usr/local/bin/allure

  script:
    - |
      if [ -d "allure-history" ]; then
        mkdir -p target/allure-results/history
        cp -r allure-history/* target/allure-results/history || true
      fi

    - allure generate ./target/allure-results --clean -o target/allure-report

    - mkdir -p allure-history
    - cp -r target/allure-report/history/* allure-history/ || true

  artifacts:
    when: always
    paths:
      - target/allure-report/
    expire_in: 15 days

pages:
  stage: deploy
  allow_failure: true
  dependencies:
    - generate-allure-report

  script:
    - mkdir -p public
    - cp -r target/allure-report/* public/

  artifacts:
    paths:
      - public/
    expire_in: 15 days
