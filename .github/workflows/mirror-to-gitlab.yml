name: Mirror and Trigger GitLab

on:
  push:
  pull_request:
    branches:
      - development
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
        run: |
          git remote add gitlab https://oauth2:${GITLAB_TOKEN}@gitlab.com/final-project-tbc/Bootcamp2026.3_Team6.git
          git push gitlab HEAD:${GITHUB_REF#refs/heads/}

  trigger-gitlab:
    runs-on: ubuntu-latest
    needs: mirror
    if: github.event_name == 'pull_request'
    steps:
      - name: Trigger GitLab Pipeline on PR branch
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Triggering GitLab pipeline for branch: $BRANCH"
          
          curl --fail -X POST \
            "https://gitlab.com/api/v4/projects/${GITLAB_PROJECT_ID}/pipeline" \
            -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\": \"${BRANCH}\"}"
